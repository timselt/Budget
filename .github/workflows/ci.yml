name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: aynı PR/branch için yeni push gelirse eski koşuyu iptal et — gereksiz CPU yok.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build + test + coverage)
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:27-dind
        options: --privileged
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Unit tests
        run: >
          dotnet test tests/BudgetTracker.UnitTests
          --configuration Release --no-build
          --logger "trx;LogFileName=unit.trx"
          --collect:"XPlat Code Coverage"
      - name: Integration tests
        run: >
          dotnet test tests/BudgetTracker.IntegrationTests
          --configuration Release --no-build
          --logger "trx;LogFileName=integration.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dotnet-test-results
          path: |
            **/TestResults/*.trx
            **/TestResults/**/coverage.cobertura.xml

  golden-scenario:
    name: Golden scenario (release gate)
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Restore + build
        run: dotnet build --configuration Release
      - name: Golden scenario
        run: >
          dotnet test tests/BudgetTracker.IntegrationTests
          --configuration Release --no-build
          --filter Category=GoldenScenario

  client:
    name: Client (build + Vitest + Playwright smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Lint
        run: pnpm lint
      - name: Vitest
        run: pnpm test
      # ─── Playwright smoke — secrets guard ──────────────────────────────────
      # Defense in depth: playwright.config.ts da secrets yokken chromium
      # projesini hiç oluşturmaz, ama ekstra olarak step seviyesinde
      # "skipped" görünürlüğü için açıkça koşullu yapıyoruz.
      # Secrets eklendikten sonra bu step her zaman koşar.
      - name: Check E2E secrets availability
        id: e2e_secrets
        run: |
          if [ -n "${{ secrets.E2E_TEST_EMAIL }}" ] && [ -n "${{ secrets.E2E_TEST_PASSWORD }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
            echo "✅ E2E secrets bulundu — Playwright smoke tam zincirle koşacak."
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  E2E secrets eksik — Playwright smoke atlandı."
            echo "    docs/compliance/ci-baseline-2026-04-19.md §Secrets bölümüne bak."
          fi
      - name: Playwright install
        if: steps.e2e_secrets.outputs.available == 'true'
        run: pnpm exec playwright install --with-deps chromium
      - name: Playwright smoke
        if: steps.e2e_secrets.outputs.available == 'true'
        run: pnpm e2e
        env:
          CI: 'true'
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: failure() && steps.e2e_secrets.outputs.available == 'true'
        with:
          name: playwright-report
          path: client/playwright-report/

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [backend, client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Vulnerable NuGet packages
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee nuget-audit.log
      - name: Fail on high-severity
        run: |
          if grep -E "High|Critical" nuget-audit.log; then
            echo "::error::High/Critical vulnerability found in NuGet packages"
            exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Client audit
        working-directory: client
        run: pnpm audit --audit-level=high || true
