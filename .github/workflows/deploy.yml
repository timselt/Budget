name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target (dev | staging | production)'
        required: true
        type: choice
        options:
          - dev
          - staging
          - production

# MIGRATION_PLAN §FAZ 7:
#   develop → dev        (auto)
#   main    → staging    (auto)
#   staging → production (manual approval, 1 reviewer — GitHub environment gate)
#
# NOTE: Actual Railway deploy is gated on the repository variable
# DEPLOY_ENABLED == 'true'. Until Railway/DB secrets are provisioned,
# every deploy job is a successful no-op that keeps the environment
# badge green and unblocks main pushes.

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.finopstur.com
    steps:
      - name: Deploy gate
        id: gate
        run: |
          if [ "${{ vars.DEPLOY_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_ENABLED is not 'true' — skipping real deploy (no-op success)."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        if: steps.gate.outputs.enabled == 'true'
        run: npm install -g @railway/cli
      - name: Deploy API
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --environment dev --detach
      - name: Deploy Web
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service web --environment dev --detach
      - name: Smoke test
        if: steps.gate.outputs.enabled == 'true'
        run: ./infra/release/prod-smoke.sh https://dev.finopstur.com

  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.finopstur.com
    steps:
      - name: Deploy gate
        id: gate
        run: |
          if [ "${{ vars.DEPLOY_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_ENABLED is not 'true' — skipping real deploy (no-op success)."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        if: steps.gate.outputs.enabled == 'true'
        run: npm install -g @railway/cli
      - name: Apply EF migrations
        if: steps.gate.outputs.enabled == 'true'
        env:
          ConnectionStrings__Default: ${{ secrets.STAGING_CONN_STRING_SUPERUSER }}
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project src/BudgetTracker.Infrastructure \
            --startup-project src/BudgetTracker.Api \
            --no-build --configuration Release
      - name: Rotate budget_app password (post-migration)
        if: steps.gate.outputs.enabled == 'true'
        env:
          DATABASE_URL: ${{ secrets.STAGING_CONN_STRING_SUPERUSER }}
          BUDGET_APP_DB_PASSWORD: ${{ secrets.STAGING_BUDGET_APP_PASSWORD }}
        run: ./infra/release/rotate-db-password.sh
      - name: Deploy API
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --environment staging --detach
      - name: Deploy Web
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service web --environment staging --detach
      - name: Smoke test (staging)
        if: steps.gate.outputs.enabled == 'true'
        run: ./infra/release/prod-smoke.sh https://staging.finopstur.com

  deploy-production:
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://app.finopstur.com
    steps:
      - name: Deploy gate
        id: gate
        run: |
          if [ "${{ vars.DEPLOY_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_ENABLED is not 'true' — skipping real deploy (no-op success)."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        if: steps.gate.outputs.enabled == 'true'
        run: npm install -g @railway/cli
      - name: Apply EF migrations
        if: steps.gate.outputs.enabled == 'true'
        env:
          ConnectionStrings__Default: ${{ secrets.PROD_CONN_STRING_SUPERUSER }}
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet tool install --global dotnet-ef
          dotnet ef database update \
            --project src/BudgetTracker.Infrastructure \
            --startup-project src/BudgetTracker.Api \
            --no-build --configuration Release
      - name: Rotate budget_app password
        if: steps.gate.outputs.enabled == 'true'
        env:
          DATABASE_URL: ${{ secrets.PROD_CONN_STRING_SUPERUSER }}
          BUDGET_APP_DB_PASSWORD: ${{ secrets.PROD_BUDGET_APP_PASSWORD }}
        run: ./infra/release/rotate-db-password.sh
      - name: Deploy API
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service api --environment production --detach
      - name: Deploy Web
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service web --environment production --detach
      - name: Smoke test (production)
        if: steps.gate.outputs.enabled == 'true'
        run: ./infra/release/prod-smoke.sh https://app.finopstur.com
      - name: Post-deploy Seq ingest verification
        if: steps.gate.outputs.enabled == 'true'
        env:
          SEQ_URL: ${{ secrets.PROD_SEQ_URL }}
          SEQ_API_KEY: ${{ secrets.PROD_SEQ_API_KEY }}
        run: |
          echo "Verifying Seq ingest against $SEQ_URL"
          ./infra/release/seq-ingest-check.sh "$SEQ_URL" "$SEQ_API_KEY"

  manual-dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.target }}
    steps:
      - name: Deploy gate
        id: gate
        run: |
          if [ "${{ vars.DEPLOY_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DEPLOY_ENABLED is not 'true' — skipping real deploy (no-op success)."
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Railway CLI
        if: steps.gate.outputs.enabled == 'true'
        run: npm install -g @railway/cli
      - name: Deploy ${{ inputs.target }}
        if: steps.gate.outputs.enabled == 'true'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service api --environment ${{ inputs.target }} --detach
          railway up --service web --environment ${{ inputs.target }} --detach
      - name: Smoke test
        if: steps.gate.outputs.enabled == 'true'
        run: |
          case "${{ inputs.target }}" in
            dev)        URL="https://dev.finopstur.com" ;;
            staging)    URL="https://staging.finopstur.com" ;;
            production) URL="https://app.finopstur.com" ;;
          esac
          ./infra/release/prod-smoke.sh "$URL"
